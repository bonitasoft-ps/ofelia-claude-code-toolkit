# Notify subscribers when a PR is opened.
#
# Self-contained (no cross-repo reusable workflow): creates a notification Issue
# in ofelia-ai-agent-mcp, assigned to the SUBSCRIBERS.json entries that opted into
# "pr". Guarded by PS_GITHUB_TOKEN — if the secret is absent or anything fails,
# the job logs a warning and exits 0 so it NEVER blocks or emails a red check.
#
# Requires: PS_GITHUB_TOKEN secret with access to bonitasoft-ps/ofelia-ai-agent-mcp.

name: Notify on PR

on:
  pull_request:
    types: [opened]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Create PR notification issue
        env:
          GH_TOKEN: ${{ secrets.PS_GITHUB_TOKEN }}
          PR_REPO: ${{ github.event.repository.name }}
          PR_NUM: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_HEAD: ${{ github.event.pull_request.head.ref }}
          PR_BASE: ${{ github.event.pull_request.base.ref }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          set +e
          if [ -z "$GH_TOKEN" ]; then
            echo "::warning::PS_GITHUB_TOKEN not configured. Skipping PR notification."
            exit 0
          fi

          # Resolve subscribers that opted into PR notifications (best-effort).
          subs_json="$(gh api repos/bonitasoft-ps/ofelia-ai-agent-mcp/contents/SUBSCRIBERS.json \
            --jq '.content' 2>/dev/null | base64 -d 2>/dev/null)"
          assignees="$(printf '%s' "$subs_json" \
            | jq -r '[.subscribers[]? | select((.notify // []) | index("pr")) | .github] | join(",")' 2>/dev/null)"

          body="$(printf '## New Pull Request in `%s`\n\n| | |\n|---|---|\n| **Title** | %s |\n| **Author** | @%s |\n| **Branch** | `%s` -> `%s` |\n| **PR** | [%s#%s](%s) |\n\n_Auto-generated by PR Watcher. Close to dismiss._' \
            "$PR_REPO" "$PR_TITLE" "$PR_AUTHOR" "$PR_HEAD" "$PR_BASE" "$PR_REPO" "$PR_NUM" "$PR_URL")"

          if [ -n "$assignees" ]; then
            gh issue create --repo bonitasoft-ps/ofelia-ai-agent-mcp \
              --title "[PR] ${PR_REPO}#${PR_NUM}: ${PR_TITLE}" \
              --body "$body" --label pr-notification --assignee "$assignees" \
              || echo "::warning::PR notification could not be created (non-fatal)."
          else
            gh issue create --repo bonitasoft-ps/ofelia-ai-agent-mcp \
              --title "[PR] ${PR_REPO}#${PR_NUM}: ${PR_TITLE}" \
              --body "$body" --label pr-notification \
              || echo "::warning::PR notification could not be created (non-fatal)."
          fi
          exit 0
